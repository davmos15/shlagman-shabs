<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Shlagman Shabs Plan</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="favicon.svg">
    <meta name="theme-color" content="#4299e1">

    <!-- Firebase Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.0/firebase-firestore-compat.min.js"></script>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container" id="main-view">
        <!-- Fixed Header Container -->
        <div class="header-container">
            <!-- Header -->
            <header class="plan-header">
                <div class="plan-eyebrow">🕯️ SHLAGMAN SHABS</div>
                <div class="plan-title" id="current-date"></div>
                <div class="plan-info-pill">
                    <span id="current-date-inline" onclick="editDate()"></span>
                    &nbsp;&middot;&nbsp;
                    <span id="current-time" onclick="editTime()">7:00 PM</span>
                </div>
                <!-- Host is not shown here by design -- the hosting family is
                     highlighted directly in the list below. This element still
                     exists (hidden) so updateDisplay() has somewhere to write
                     the current host without special-casing the header. -->
                <span id="current-host" style="display:none"></span>
            </header>

            <!-- Tab Navigation -->
            <nav class="tab-nav plan-tab-nav">
                <button class="tab-btn plan-tab-btn active" data-tab="rsvp" onclick="switchTab('rsvp')">
                    Who's Coming
                </button>
                <button class="tab-btn plan-tab-btn" data-tab="menu" onclick="switchTab('menu')">
                    What to Bring
                </button>
            </nav>
        </div>

        <!-- Tab Content -->
        <main class="tab-content plan-tab-content">
            <!-- RSVP Tab -->
            <div class="tab-pane active" id="rsvp-tab" data-section-title="Who's Coming">
                <div class="plan-summary-bar" id="guest-summary"></div>
                <div id="rsvp-list"></div>
            </div>

            <!-- Menu Tab -->
            <div class="tab-pane" id="menu-tab" data-section-title="Menu">
                <label class="plan-menu-notes-label">Menu notes</label>
                <textarea id="menu-notes" class="plan-menu-notes-card"
                          placeholder="Add any notes about the menu, dietary restrictions, special requests, etc..."
                          oninput="updateMenuNotes(this.value)"></textarea>
                <div class="plan-menu-list-label">What to bring</div>
                <div id="bring-list"></div>
                <div class="plan-edit-menu-actions">
                    <button class="plan-edit-menu-btn" onclick="editItems()">
                        Edit Menu Items
                    </button>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav plan-bottom-nav">
            <button class="nav-btn active" data-nav="plan" onclick="switchView('plan')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">This week</span>
            </button>
            <button class="nav-btn" data-nav="history" onclick="switchView('history')">
                <span class="nav-icon">📅</span>
                <span class="nav-label">Past dinners</span>
            </button>
            <button class="nav-btn" data-nav="share" onclick="switchView('share')">
                <span class="nav-icon">📲</span>
                <span class="nav-label">Share update</span>
            </button>
        </nav>
    </div>

    <!-- History View -->
    <div class="app-container history-view" id="history-view">
        <!-- Fixed Header Container -->
        <div class="header-container">
            <!-- Header -->
            <header class="app-header">
                <h1 class="app-title">📅 Shabbat History</h1>
                <div class="event-info-card">
                    <div class="history-select-container">
                        <label class="history-select-label">Select a past event:</label>
                        <select id="history-select" onchange="loadHistoryEvent()">
                            <option value="">Select an event...</option>
                        </select>
                    </div>
                </div>
            </header>
        </div>
        
        <!-- Tab Navigation -->
        <nav class="tab-nav" id="history-tab-nav">
            <button class="tab-btn active" data-tab="history-rsvp" onclick="switchHistoryTab('history-rsvp')">
                👥 RSVP
            </button>
            <button class="tab-btn" data-tab="history-menu" onclick="switchHistoryTab('history-menu')">
                🍽️ Menu
            </button>
        </nav>

        <!-- History Content -->
        <main class="tab-content">
            <div id="history-content" class="history-content">
                <!-- RSVP Tab -->
                <div class="tab-pane active" id="history-rsvp-tab">
                    <div class="guest-summary-card" id="history-guest-summary"></div>
                    <div class="content-section">
                        <div id="history-rsvp-list"></div>
                    </div>
                </div>

                <!-- Menu Tab -->
                <div class="tab-pane" id="history-menu-tab">
                    <div class="content-section">
                        <div id="history-menu-list"></div>
                    </div>
                </div>

                <!-- Favourites Tab -->
                <div class="tab-pane" id="favourites-tab">
                    <div class="guest-summary-card">
                        <strong>🌟 Family Favourites</strong>
                        <span class="summary-details">Most loved dishes from our Shabbat gatherings</span>
                    </div>
                    <div class="content-section">
                        <div id="favourites-list"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn" data-nav="plan" onclick="switchView('plan')">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Plan</span>
            </button>
            <button class="nav-btn active" data-nav="history" onclick="switchView('history')">
                <span class="nav-icon">📅</span>
                <span class="nav-label">History</span>
            </button>
            <button class="nav-btn" data-nav="share" onclick="switchView('share')">
                <span class="nav-icon">📱</span>
                <span class="nav-label">Share</span>
            </button>
        </nav>
    </div>

    <!-- Edit Items Modal -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <h3>Edit Menu</h3>
            <div id="edit-list"></div>
            <input type="text" id="new-item-input" placeholder="Add new item..." 
                   class="new-item-input"
                   onkeypress="if(event.key==='Enter') addNewItem()">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="addNewItem()">Add Item</button>
                <button class="modal-btn secondary" onclick="closeEditModal()">Done</button>
            </div>
        </div>
    </div>

    <!-- Edit Host Modal -->
    <div class="modal" id="host-modal">
        <div class="modal-content">
            <h3>Select Host</h3>
            <div id="host-list"></div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeHostModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Edit Date Modal -->
    <div class="modal" id="date-modal">
        <div class="modal-content">
            <h3>Set Shabbat Date</h3>
            <input type="date" id="date-input" class="date-input">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="saveDate()">Save Date</button>
                <button class="modal-btn secondary" onclick="closeDateModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Time Selection Modal -->
    <div class="modal" id="time-modal">
        <div class="modal-content time-modal-content">
            <h3>Select Time</h3>
            
            <!-- TBC Option -->
            <div class="tbc-option">
                <button class="modal-btn secondary tbc-btn" onclick="setTimeTBC()">
                    Set as TBC (To Be Confirmed)
                </button>
            </div>
            
            <!-- Time Dropdowns -->
            <div class="time-selectors">
                <div class="time-inputs">
                    <select id="hour-select" onchange="updateTimeDisplay()">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7" selected>7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                    
                    <span class="time-separator">:</span>
                    
                    <select id="minute-select" onchange="updateTimeDisplay()">
                        <option value="00" selected>00</option>
                        <option value="05">05</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                        <option value="25">25</option>
                        <option value="30">30</option>
                        <option value="35">35</option>
                        <option value="40">40</option>
                        <option value="45">45</option>
                        <option value="50">50</option>
                        <option value="55">55</option>
                    </select>
                </div>
                
                <!-- AM/PM Toggle -->
                <div class="ampm-buttons">
                    <button id="am-btn" class="modal-btn secondary" onclick="setAMPM('AM')">AM</button>
                    <button id="pm-btn" class="modal-btn primary" onclick="setAMPM('PM')">PM</button>
                </div>
            </div>
            
            
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="saveTime()">Save</button>
                <button class="modal-btn secondary" onclick="closeTimeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Name Input Modal for Favourites -->
    <div class="modal" id="name-input-modal">
        <div class="modal-content">
            <h3>Enter your name to favourite this item</h3>
            <input type="text" id="name-input" placeholder="Your name..." 
                   class="guest-input"
                   onkeypress="if(event.key==='Enter') addFavourite()">
            <div class="modal-buttons">
                <button class="modal-btn primary" onclick="addFavourite()">Add Favourite</button>
                <button class="modal-btn secondary" onclick="closeNameInputModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Who Favourited Modal -->
    <div class="modal" id="who-favourited-modal">
        <div class="modal-content">
            <h3 id="who-favourited-title">Who favourited this item</h3>
            <div id="who-favourited-list"></div>
            <div class="modal-buttons">
                <button class="modal-btn secondary" onclick="closeWhoFavouritedModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div class="modal" id="confirm-modal">
        <div class="modal-content confirm-modal-content">
            <h3 id="confirm-modal-title">Confirm</h3>
            <p id="confirm-modal-message"></p>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="confirm-modal-yes">Yes</button>
                <button class="modal-btn secondary" id="confirm-modal-no">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Custom Prompt Modal -->
    <div class="modal" id="prompt-modal">
        <div class="modal-content">
            <h3 id="prompt-modal-title">Edit</h3>
            <input type="text" id="prompt-modal-input" class="prompt-modal-input" placeholder="">
            <div class="modal-buttons">
                <button class="modal-btn primary" id="prompt-modal-ok">OK</button>
                <button class="modal-btn secondary" id="prompt-modal-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // Firebase Configuration - will be loaded dynamically
        let firebaseConfig = {
            apiKey: "FIREBASE_API_KEY_PLACEHOLDER",
            authDomain: "shlagman-shabs.firebaseapp.com",
            projectId: "shlagman-shabs",
            storageBucket: "shlagman-shabs.firebasestorage.app",
            messagingSenderId: "718510100727",
            appId: "1:718510100727:web:c4a7afdadfe2ae6e8843f2",
            measurementId: "G-EV7GE2GVQK"
        };

        // Initialize Firebase
        let db;
        if (firebaseConfig.apiKey === "PLACEHOLDER_NOT_REPLACED" || firebaseConfig.apiKey === "YOUR_FIREBASE_API_KEY_HERE") {
            console.error("Firebase API key not configured. Please check deployment settings.");
        } else {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("Firebase initialized successfully with API key starting with:", firebaseConfig.apiKey.substring(0, 10) + "...");
                
                // Test Firebase connection
                db.collection('test').doc('connection').set({
                    test: true,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    console.log("✅ Firebase write test successful");
                }).catch((error) => {
                    console.error("❌ Firebase write test failed:", error);
                    console.error("Error code:", error.code);
                    console.error("Error message:", error.message);
                });
            } catch (error) {
                console.error("Firebase initialization error:", error);
            }
        }
        
        // --- Utility Functions ---

        // Toast notification
        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), duration);
        }

        // Custom confirm dialog (returns a Promise)
        function showConfirm(title, message) {
            return new Promise((resolve) => {
                document.getElementById('confirm-modal-title').textContent = title;
                document.getElementById('confirm-modal-message').textContent = message;
                document.getElementById('confirm-modal').style.display = 'flex';

                const yesBtn = document.getElementById('confirm-modal-yes');
                const noBtn = document.getElementById('confirm-modal-no');

                function cleanup() {
                    document.getElementById('confirm-modal').style.display = 'none';
                    yesBtn.replaceWith(yesBtn.cloneNode(true));
                    noBtn.replaceWith(noBtn.cloneNode(true));
                }

                yesBtn.onclick = () => { cleanup(); resolve(true); };
                noBtn.onclick = () => { cleanup(); resolve(false); };
                document.getElementById('confirm-modal').onclick = (e) => {
                    if (e.target === document.getElementById('confirm-modal')) { cleanup(); resolve(false); }
                };
            });
        }

        // Custom prompt dialog (returns a Promise)
        function showPrompt(title, defaultValue) {
            return new Promise((resolve) => {
                document.getElementById('prompt-modal-title').textContent = title;
                const input = document.getElementById('prompt-modal-input');
                input.value = defaultValue || '';
                document.getElementById('prompt-modal').style.display = 'flex';
                setTimeout(() => input.focus(), 100);

                const okBtn = document.getElementById('prompt-modal-ok');
                const cancelBtn = document.getElementById('prompt-modal-cancel');

                function cleanup() {
                    document.getElementById('prompt-modal').style.display = 'none';
                    okBtn.replaceWith(okBtn.cloneNode(true));
                    cancelBtn.replaceWith(cancelBtn.cloneNode(true));
                    input.onkeypress = null;
                }

                okBtn.onclick = () => { const val = input.value.trim(); cleanup(); resolve(val || null); };
                cancelBtn.onclick = () => { cleanup(); resolve(null); };
                input.onkeypress = (e) => { if (e.key === 'Enter') { const val = input.value.trim(); cleanup(); resolve(val || null); } };
                document.getElementById('prompt-modal').onclick = (e) => {
                    if (e.target === document.getElementById('prompt-modal')) { cleanup(); resolve(null); }
                };
            });
        }

        // HTML escaping to prevent XSS
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Debounce helper
        function debounce(fn, delay) {
            let timer;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // Family members from the WhatsApp group (alphabetical order).
        // defaultFamilyMembers is the immutable seed list shipped in code.
        // familyMembers is the live list: it can be edited by users and is
        // persisted in Firebase (see loadStateFromFirebase / saveStateToFirebase).
        const defaultFamilyMembers = [
            'Adi & Gabe', 'Begleiter', 'Bobba', 'Gilla',
            'Meyerowitz', 'Mosberg', 'Moskow 29b', 'Moskow 5/66', 'PB'
        ];
        let familyMembers = defaultFamilyMembers.slice();

        // Default families that have been renamed away. Tracked so a code default
        // is never resurrected once a user has renamed it, while genuinely new
        // defaults added in code later still get merged in (see reconcileFamilyMembers).
        let retiredFamilies = [];

        // Default guest counts for each family
        const defaultGuestCounts = {
            'Adi & Gabe': 2,
            'Begleiter': 2,
            'Bobba': 1,
            'Gilla': 1,
            'Meyerowitz': 6,
            'Mosberg': 2,
            'Moskow 29b': 3,
            'Moskow 5/66': 3,
            'PB': 6
        };

        // Named sub-members for families (optional)
        const familySubMembers = {
            'Adi & Gabe': ['Adi', 'Gabe'],
            'Begleiter': ['Jake', 'Tali'],
            'Meyerowitz': ['Lawrence', 'Ruth', 'Eity', 'Gili', 'Amir', 'Lior'],
            'Mosberg': ['Ari', 'Ellie'],
            'Moskow 29b': ['Gary', 'Tamar', 'Ori'],
            'Moskow 5/66': ['Davi', 'Zeecee', 'Yakira'],
            'PB': ['Josh', 'Yael', 'Noah', 'Libby', 'Raph', 'Lyla']
        };
        
        // Host rotation (every 2 weeks)
        const hostRotation = ['Gilla', 'Ruth', 'Tamar'];
        
        // Items typically needed for Shabbat lunch
        let bringItems = [];
        
        // State management
        let rsvpData = {};
        let bringData = {};
        let currentHost = '';
        let currentDate = '';
        let currentTime = '7:00 PM'; // Default time
        let additionalGuests = [];
        let menuNotes = ''; // Notes for the menu section
        let favouritesData = {}; // Family favourites data
        let holidayData = {}; // { 'familyName': { until: '2026-04-10' | 'indefinite' }, 'familyName:subName': { until: ... } }

        // Holiday functions
        function getHolidayKey(family, subName) {
            return subName ? family + ':' + subName : family;
        }

        function isOnHoliday(family, subName) {
            const key = getHolidayKey(family, subName);
            const h = holidayData[key];
            if (!h) return false;
            // No until date yet chosen (still picking "Until date" mode) counts as
            // still away, same as 'indefinite' -- only a concrete past date expires it.
            if (!h.until || h.until === 'indefinite') return true;
            return new Date(h.until) >= new Date(new Date().toISOString().split('T')[0]);
        }

        function getHolidayLabel(family, subName) {
            const key = getHolidayKey(family, subName);
            const h = holidayData[key];
            if (!h) return '';
            if (h.until === 'indefinite') return 'Away';
            const d = new Date(h.until);
            return 'til ' + d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
        }

        const defaultHolidayEmoji = '🏝️';
        const holidayEmojiOptions = ['🏝️', '✈️', '🤒'];

        function getHolidayEmoji(family, subName) {
            const key = getHolidayKey(family, subName);
            const h = holidayData[key];
            return (h && h.emoji) || defaultHolidayEmoji;
        }

        function applyHoliday(family, subName) {
            const defaultCount = defaultGuestCounts[family] || 1;
            if (subName) {
                // Apply to specific sub-member
                const data = rsvpData[family];
                if (data && data.members) {
                    const sub = data.members.find(m => m.name === subName);
                    if (sub) sub.status = 'not-coming';
                    data.status = deriveParentStatus(data.members);
                    syncMembersToGuests(family);
                    if (data.status === 'not-coming') {
                        data.previousGuests = data.guests || defaultCount;
                        data.guests = 0;
                    }
                }
            } else {
                // Apply to whole family
                const data = rsvpData[family];
                if (data) {
                    data.previousGuests = data.guests || defaultCount;
                    data.status = 'not-coming';
                    data.guests = 0;
                    if (data.members) data.members.forEach(m => m.status = 'not-coming');
                }
            }
            saveStateToFirebase();
        }

        // Tapping an away emoji that isn't already selected sets it (defaulting
        // to "indefinite" until the user picks "Until date"); tapping the
        // already-selected emoji clears the away status back to pending.
        function toggleAwayEmoji(family, subName, emoji) {
            const key = getHolidayKey(family, subName);
            const existing = holidayData[key];
            if (existing && existing.emoji === emoji) {
                clearAway(family, subName);
                return;
            }
            const priorMode = existing && existing.until !== 'indefinite' ? existing.until : null;
            holidayData[key] = { emoji, until: existing ? (existing.until === 'indefinite' ? 'indefinite' : priorMode || '') : 'indefinite' };
            applyHoliday(family, subName);
            saveHolidaysToFirebase();
            updateDisplay();
        }

        function clearAway(family, subName) {
            const key = getHolidayKey(family, subName);
            delete holidayData[key];
            const defaultCount = defaultGuestCounts[family] || 1;
            const data = rsvpData[family];
            if (subName) {
                if (data && data.members) {
                    const sub = data.members.find(m => m.name === subName);
                    if (sub) sub.status = 'pending';
                    data.status = deriveParentStatus(data.members);
                    syncMembersToGuests(family);
                    if (data.status !== 'coming' && data.status !== 'not-coming') {
                        data.guests = data.previousGuests || defaultCount;
                    }
                }
            } else if (data) {
                data.status = 'pending';
                data.guests = data.previousGuests || defaultCount;
                if (data.members) {
                    data.members.forEach(m => {
                        if (!isOnHoliday(family, m.name)) m.status = 'pending';
                    });
                }
            }
            saveHolidaysToFirebase();
            saveStateToFirebase();
            updateDisplay();
        }

        function setAwayMode(family, subName, mode) {
            const key = getHolidayKey(family, subName);
            const existing = holidayData[key];
            if (!existing) return;
            if (mode === 'indefinite') {
                holidayData[key] = { emoji: existing.emoji, until: 'indefinite' };
            } else {
                const priorDate = existing.until && existing.until !== 'indefinite' ? existing.until : '';
                holidayData[key] = { emoji: existing.emoji, until: priorDate };
            }
            saveHolidaysToFirebase();
            updateDisplay();
        }

        function setAwayUntilDate(family, subName, dateStr) {
            const key = getHolidayKey(family, subName);
            const existing = holidayData[key];
            if (!existing) return;
            holidayData[key] = { emoji: existing.emoji, until: dateStr };
            saveHolidaysToFirebase();
            updateDisplay();
        }

        function applyAllHolidays() {
            Object.keys(holidayData).forEach(key => {
                if (!isOnHoliday(key.split(':')[0], key.includes(':') ? key.split(':')[1] : null)) {
                    delete holidayData[key]; // expired
                    return;
                }
                const parts = key.split(':');
                applyHoliday(parts[0], parts[1] || null);
            });
        }

        async function saveHolidaysToFirebase() {
            try {
                await db.collection('holidays').doc('all').set(holidayData);
            } catch (error) {
                console.error('Failed to save holidays:', error);
            }
        }

        async function loadHolidaysFromFirebase() {
            try {
                const doc = await db.collection('holidays').doc('all').get();
                if (doc.exists) {
                    holidayData = doc.data() || {};
                }
            } catch (error) {
                console.error('Failed to load holidays:', error);
            }
        }
        
        // Initialize family member RSVPs. Every family always gets at least one
        // named member (falling back to the family's own name) so the "expand to
        // see individual members" UI has something to show, even for one-person
        // families that have no separate familySubMembers entry.
        function initMembersArray(familyName) {
            if (familySubMembers[familyName]) {
                return familySubMembers[familyName].map(name => ({ name, status: 'pending' }));
            }
            return [{ name: familyName, status: 'pending' }];
        }

        // Guarantee every family and additional guest has a non-empty members
        // array, synthesizing a single self-named member when one is missing
        // (covers older persisted data saved before every family had members).
        function ensureMembersArrays() {
            familyMembers.forEach(member => {
                const defaultCount = defaultGuestCounts[member] || 1;
                if (!rsvpData[member]) {
                    rsvpData[member] = { status: 'pending', guests: defaultCount, previousGuests: defaultCount, members: initMembersArray(member) };
                    return;
                }
                const data = rsvpData[member];
                if (data.previousGuests === undefined) {
                    data.previousGuests = data.guests || defaultCount;
                }
                if (!data.members || data.members.length === 0) {
                    data.members = [{ name: member, status: data.status || 'pending' }];
                }
            });

            additionalGuests.forEach(guest => {
                if (!guest.members || guest.members.length === 0) {
                    guest.members = [{ name: guest.name, status: guest.status || 'pending' }];
                }
            });
        }

        // Merge the persisted family list with the code defaults. The persisted
        // list (with any user renames) wins and keeps its order; any default that
        // is new in code AND hasn't been retired via a rename is appended, so
        // roster changes shipped in code still show up without resurrecting
        // families the user has renamed away.
        function reconcileFamilyMembers(persisted) {
            const list = Array.isArray(persisted) && persisted.length ? persisted.slice() : defaultFamilyMembers.slice();
            defaultFamilyMembers.forEach(def => {
                if (!list.includes(def) && !retiredFamilies.includes(def)) {
                    list.push(def);
                }
            });
            familyMembers = list;
        }

        familyMembers.forEach(member => {
            const defaultCount = defaultGuestCounts[member] || 1;
            const members = initMembersArray(member);
            rsvpData[member] = { status: 'pending', guests: defaultCount, previousGuests: defaultCount, members };
        });
        
        // Firebase Functions
        async function saveStateToFirebase() {
            console.log("Attempting to save to Firebase...");
            
            if (!db) {
                console.error("Database not initialized - cannot save");

            }
            
            try {
                const state = {
                    rsvpData,
                    bringData,
                    currentHost,
                    currentDate,
                    currentTime,
                    bringItems,
                    additionalGuests,
                    menuNotes,
                    familyMembers,
                    retiredFamilies,
                    lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                console.log("Saving state:", state);
                await db.collection('shabbat-plans').doc('current').set(state);
                console.log("✅ Successfully saved to Firebase");

                console.error('❌ Failed to save to Firebase:', error);
                console.error('Error code:', error.code);
                console.error('Error message:', error.message);
                
                if (error.code === 'permission-denied') {
                    showToast('Unable to save: Permission denied');

        // Initialize bring items
        function initializeBringData() {

        function getCurrentHost() {
            // Use manually set host if available, otherwise use rotation
            if (currentHost) return currentHost;
            
            // For this week, Ruth is hosting
            // Simple rotation based on week number - adjusted to show Ruth this week
            const weekNumber = Math.floor(Date.now() / (1000 * 60 * 60 * 24 * 14)) + 1;
            return hostRotation[weekNumber % hostRotation.length];
        }
        
        function getNextFridayNight() {
            // Use manually set date if available
            let dateObj;
            if (currentDate) {
                dateObj = new Date(currentDate);
            } else {
                // Check if July 4th, 2025 is the next Friday
                const today = new Date();
                const july4 = new Date('2025-07-04');
                
                // If July 4th is in the future and is a Friday, use it
                if (july4 > today && july4.getDay() === 5) {
                    dateObj = july4;
                } else {
                    // Otherwise calculate next Friday
                    const daysUntilFriday = (5 - today.getDay() + 7) % 7;
                    dateObj = new Date(today);
                    dateObj.setDate(today.getDate() + (daysUntilFriday === 0 ? 7 : daysUntilFriday));
                }
            }
            
            const dayOfWeek = dateObj.getDay();
            const formattedDate = dateObj.toLocaleDateString('en-AU', {
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            
            // Return appropriate format based on day of week
            if (dayOfWeek === 6) { // Saturday
                return `Shabbat Lunch - ${formattedDate}`;
            } else if (dayOfWeek === 5) { // Friday
                return `Friday Night Dinner - ${formattedDate}`;
            } else {
                return formattedDate;
            }
        }
        
        function updateDisplay() {
            // getNextFridayNight() returns "{Event type} - {date}" (or just the
            // date when it's neither a Friday nor a Saturday). Split it so the
            // header can show the event type as the title and the date on its
            // own in the info pill.
            const eventLine = getNextFridayNight();
            const dashIdx = eventLine.indexOf(' - ');
            const eventType = dashIdx > -1 ? eventLine.slice(0, dashIdx) : 'Shabbat Plan';
            const dateOnly = dashIdx > -1 ? eventLine.slice(dashIdx + 3) : eventLine;

            document.getElementById('current-date').textContent = eventType;
            document.getElementById('current-date-inline').textContent = dateOnly;
            document.getElementById('current-time').textContent = currentTime || '7:00 PM';
            document.getElementById('current-host').textContent = getCurrentHost();

            // Update menu notes
            const notesTextarea = document.getElementById('menu-notes');
            if (notesTextarea) {
                notesTextarea.value = menuNotes || '';
            }
            
            // Update RSVP list
            updateRSVPList();
            updateGuestSummary();
            updateBringList();
        }
        
        const debouncedSaveNotes = debounce(() => saveStateToFirebase(), 500);

        // Track which families are expanded
        const expandedFamilies = new Set();

        // Which single name field (family, sub-member, guest or guest sub-member)
        // is currently showing an inline text input instead of static text.
        // Only one field can be in edit mode at a time.
        let editingName = null;

        // Keys ("familyName:subIdx" style) of member-level away pickers that are
        // currently expanded open.
        const subAwayOpen = new Set();

        function isEditingFamily(member) { return !!editingName && editingName.type === 'family' && editingName.member === member; }
        function isEditingSub(member, subIdx) { return !!editingName && editingName.type === 'sub' && editingName.member === member && editingName.subIdx === subIdx; }
        function isEditingGuest(idx) { return !!editingName && editingName.type === 'guest' && editingName.idx === idx; }
        function isEditingGuestSub(idx, subIdx) { return !!editingName && editingName.type === 'guestSub' && editingName.idx === idx && editingName.subIdx === subIdx; }

        // Builds the shared "editable name" control: a text input + a check
        // confirm button. Commits on Enter or on tapping check; there is no
        // cancel action. An optional onRemove shows a small delete button next
        // to the confirm button (used for removing an individual person while
        // renaming them, since there's no dedicated delete icon at that level).
        function appendEditableName(container, currentValue, onCommit, onRemove) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'plan-name-input';
            input.value = currentValue;

            const commit = () => onCommit(input.value.trim() || currentValue);
            input.addEventListener('keydown', e => { if (e.key === 'Enter') commit(); });

            const confirmBtn = document.createElement('button');
            confirmBtn.type = 'button';
            confirmBtn.className = 'plan-name-confirm';
            confirmBtn.textContent = '✓';
            confirmBtn.addEventListener('click', commit);

            container.appendChild(input);
            container.appendChild(confirmBtn);

            if (onRemove) {
                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.className = 'plan-name-remove';
                removeBtn.textContent = '🗑';
                removeBtn.title = 'Remove this person';
                removeBtn.addEventListener('click', onRemove);
                container.appendChild(removeBtn);
            }

            setTimeout(() => input.focus(), 0);
        }

        // Builds a family/member-level Yes/No pair. Tapping the already-active
        // button clears the status back to 'pending'.
        function appendYesNo(container, status, onSet, small) {
            const yesBtn = document.createElement('button');

        // Builds the inline Away/Holiday panel shared by the family-level and
        // per-member expanded views. `compact` renders the smaller member-scoped

        function buildAwayPanel(family, subName, compact) {
            const key = getHolidayKey(family, subName);
            const existing = holidayData[key];
            const panel = document.createElement('div');
            panel.className = 'plan-away-panel' + (compact ? ' compact' : '');

                untilBtn.textContent = 'Until date';

        function syncMembersToGuests(member) {
            const data = rsvpData[member];
            if (data.members && data.members.length > 0) {
                data.guests = data.members.filter(m => m.status === 'coming').length;
                data.previousGuests = data.members.length;
            }
        }

        function deriveParentStatus(members) {
            // No sub-members means there is no per-person info to derive from.
            if (!members || members.length === 0) return 'pending';
            const allNotComing = members.every(m => m.status === 'not-coming');
            if (allNotComing) return 'not-coming';
            if (members.some(m => m.status === 'coming')) return 'coming';
            return 'pending';
        }

        // Setting a family's Yes/No sets that status for the whole family and
        // cascades it to every member (except members who are individually away,
        // whose own away status takes precedence). Tapping the already-active
        // button clears back to 'pending'. The reverse is not automatic: members
        // can then be set individually.
        function setFamilyStatus(member, status) {
            const data = rsvpData[member];
            const defaultCount = defaultGuestCounts[member] || 1;
            const newStatus = data.status === status ? 'pending' : status;
            data.status = newStatus;

            if (data.members) {
                data.members.forEach(m => {
                    if (newStatus !== 'not-coming' && isOnHoliday(member, m.name)) return;
                    m.status = newStatus;
                });
                data.status = deriveParentStatus(data.members);
                syncMembersToGuests(member);
            }

            if (data.status === 'not-coming') {
                data.previousGuests = data.guests || defaultCount;
                data.guests = 0;
            } else if (data.status === 'coming') {
                if (data.members) syncMembersToGuests(member);
                else data.guests = data.previousGuests || defaultCount;
            } else {
                data.guests = data.previousGuests || defaultCount;
            }

            updateDisplay();
            saveStateToFirebase();
        }

        // Rename a family everywhere it is referenced (rsvp data, family list,
        // holidays, host and menu assignments) so the change is consistent.
        function renameFamilyKey(oldName, newName) {
            if (rsvpData[oldName]) {
                rsvpData[newName] = rsvpData[oldName];
                delete rsvpData[oldName];
            }

            // Carry the default guest count over under the new name so that
            // status changes after a rename still fall back to the family's
            // real default instead of the generic 1-guest fallback.
            if (defaultGuestCounts[oldName] !== undefined) {
                defaultGuestCounts[newName] = defaultGuestCounts[oldName];
            }

            const idx = familyMembers.indexOf(oldName);
            if (idx > -1) familyMembers[idx] = newName;

            // Track roster changes so reconcileFamilyMembers doesn't resurrect a
            // renamed-away default, and un-retire a default name that's reused.
            if (defaultFamilyMembers.includes(oldName) && !retiredFamilies.includes(oldName)) {
                retiredFamilies.push(oldName);
            }
            const reused = retiredFamilies.indexOf(newName);
            if (reused > -1) retiredFamilies.splice(reused, 1);

            // Holiday keys are stored as "family" or "family:subName"
            Object.keys(holidayData).forEach(key => {
                if (key === oldName) {
                    holidayData[newName] = holidayData[key];
                    delete holidayData[key];
                } else if (key.startsWith(oldName + ':')) {
                    holidayData[newName + key.slice(oldName.length)] = holidayData[key];
                    delete holidayData[key];
                }
            });

            if (currentHost === oldName) currentHost = newName;

            if (expandedFamilies.has(oldName)) {
                expandedFamilies.delete(oldName);
                expandedFamilies.add(newName);
            }

            // Update menu "who's bringing" assignments
            Object.values(bringData).forEach(d => {
                if (d && d.person === oldName) d.person = newName;
            });
        }

            d.members.splice(subIdx, 1);

                d.status = deriveParentStatus(d.members);
                syncMembersToGuests(member);
                if (d.status === 'not-coming') d.guests = 0;
            } else {
                // No individuals left -- fall back to a single self-named member
                // rather than an empty list, matching every other family's shape.
                const defaultCount = defaultGuestCounts[member] || 1;
                d.members = [{ name: member, status: 'pending' }];

        async function shareSummary() {
            const host = getCurrentHost();
            const dateStr = getNextFridayNight();
            
            // Parse the date to get a proper Date object

            if (currentDate) {
                eventDate = new Date(currentDate);
            } else {

            }
            
            // Format the date as requested
            const formattedDate = eventDate.toLocaleDateString('en-AU', {

                month: 'short',
                year: 'numeric'
            });
            
            // Determine if it's lunch or dinner based on the date string

            // Get the time or use TBC if not set
            const eventTime = currentTime || 'TBC';
            
            // Array of food emojis to randomly select from
            const foodEmojis = ['🥗', '🍝', '🥘', '🍲', '🥙', '🌮', '🍛', '🥧', '🍰', '🧁', '🍪', '🍓', '🥖', '🧆', '🥒', '🍅'];
            const randomFoodEmoji = foodEmojis[Math.floor(Math.random() * foodEmojis.length)];
            
            // Build menu items string
            let menuItems = [];
            bringItems.forEach(item => {
                if (bringData[item] && bringData[item].assigned) {
                    menuItems.push(`${item} - ${bringData[item].person}`);
                } else {
                    menuItems.push(item);
                }
            });
            
            const baseURL = 'https://shlagman-shabs.vercel.app';
            
            let message = `📅 ${eventType} - ${formattedDate}\n`;
            message += `🏠 Host: ${host}\n`;
            message += `🕑 Time: ${eventTime}\n`;
            
            if (menuItems.length > 0) {
                message += `${randomFoodEmoji} Menu: ${menuItems.join(', ')}\n`;
            }
            
            message += `\n🔗 RSVP: ${baseURL}`;
            
            // Use Web Share API on mobile, fallback to clipboard
            if (navigator.share) {
                navigator.share({ text: message }).catch(() => {});
            } else {
                navigator.clipboard.writeText(message).then(() => {
                    showToast('Update copied to clipboard!');
                }).catch(() => {
                    showToast('Update ready - copy from console');
                    console.log(message);
                });
            }
        }

        // Archive and History Functions
        async function archiveCurrentEvent() {
            // Determine the event date for archiving
            let archiveDate;
            if (currentDate) {
                archiveDate = currentDate;
            } else {
                // Calculate the last Friday if no date is set
                const today = new Date();
                const lastFriday = new Date(today);
                const daysFromLastFriday = (today.getDay() + 2) % 7; // Days since last Friday
                lastFriday.setDate(today.getDate() - daysFromLastFriday);
                archiveDate = lastFriday.toISOString().split('T')[0]; // Format as YYYY-MM-DD
            }
            
            const eventData = {
                date: archiveDate,
                time: currentTime || '7:00 PM',
                host: currentHost || getCurrentHost(),
                rsvpData: rsvpData,
                bringData: bringData,
                bringItems: bringItems,
                additionalGuests: additionalGuests,
                menuNotes: menuNotes || '',
                totalGuests: calculateTotalGuests(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            try {
                // Save to history collection
                await db.collection('shabbat-history').add(eventData);
                
                // Reset current event
                resetToDefaults();
            } catch (error) {
                console.error('Failed to archive event:', error);
            }
        }
        
        function resetToDefaults() {
            console.log("🔄 Resetting to defaults and setting up next event");
            
            // Reset all RSVP data to a fresh (pending) state for the new week.
            // Keep each family's existing people (renamed/edited rosters) and just
            // reset their status; only fall back to the code defaults for families
            // that have no people yet.
            familyMembers.forEach(member => {
                const defaultCount = defaultGuestCounts[member] || 1;
                const existing = rsvpData[member];
                let members;
                if (existing && existing.members && existing.members.length) {
                    members = existing.members.map(m => ({ name: m.name, status: 'pending' }));
                } else {
                    members = initMembersArray(member);
                }
                rsvpData[member] = { status: 'pending', guests: defaultCount, previousGuests: defaultCount, members };
            });

            // Clear all menu items and data
            bringItems = [];
            bringData = {};

            // Clear additional guests
            additionalGuests = [];
            expandedFamilies.clear();
            
            // Clear menu notes
            menuNotes = '';
            
            // Set up next event
            setupNextEvent();
            
            updateDisplay();
            console.log("💾 Saving reset data to Firebase...");
            saveStateToFirebase();
        }
        
        function setupNextEvent() {
            // Get the next host in rotation
            const previousHost = currentHost || getCurrentHost();
            const currentIndex = hostRotation.indexOf(previousHost);
            const nextIndex = (currentIndex + 1) % hostRotation.length;
            currentHost = hostRotation[nextIndex];
            console.log(`🏠 Next host set to: ${currentHost}`);
            
            // Calculate next Friday
            const today = new Date();
            const dayOfWeek = today.getDay();
            let daysUntilFriday;
            
            // If it's Friday or Saturday, go to next Friday
            if (dayOfWeek === 5 || dayOfWeek === 6) {
                daysUntilFriday = (12 - dayOfWeek) % 7;
            } else {
                // Sunday through Thursday
                daysUntilFriday = (5 - dayOfWeek + 7) % 7;
                if (daysUntilFriday === 0) daysUntilFriday = 7;
            }
            
            const nextFriday = new Date(today);
            nextFriday.setDate(today.getDate() + daysUntilFriday);
            currentDate = nextFriday.toISOString().split('T')[0]; // Format as YYYY-MM-DD
            console.log(`📅 Next date set to: ${currentDate}`);
            
            // Keep default time
            currentTime = '7:00 PM';
        }
        
        function calculateTotalGuests() {
            const familyGuests = familyMembers
                .filter(member => rsvpData[member].status === 'coming')
                .reduce((sum, member) => sum + rsvpData[member].guests, 0);
            
            const additionalGuestsTotal = additionalGuests
                .filter(g => g.status === 'coming')
                .reduce((sum, guest) => sum + (guest.guests || 1), 0);
            
            return familyGuests + additionalGuestsTotal;
        }
        
        function showHistory() {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('history-view').style.display = 'block';
            loadHistoryEvents();
        }
        
        function showMainView() {
            document.getElementById('history-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
        }
        
        async function loadHistoryEvents() {
            try {
                const snapshot = await db.collection('shabbat-history')
                    .orderBy('date', 'desc')
                    .limit(50)
                    .get();
                
                const select = document.getElementById('history-select');
                select.innerHTML = '<option value="">Select an event...</option>';
                
                // Add Family Favourites option first
                const favouritesOption = document.createElement('option');
                favouritesOption.value = 'family-favourites';
                favouritesOption.textContent = '⭐ Family Favourites';
                select.appendChild(favouritesOption);
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const dateObj = new Date(data.date);
                    const dateStr = dateObj.toLocaleDateString('en-AU', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = `${dateStr} - Host: ${data.host}`;
                    select.appendChild(option);
                });
                
                if (snapshot.empty) {
                    const option = document.createElement('option');
                    option.textContent = 'No history available yet';
                    option.disabled = true;
                    select.appendChild(option);
                }
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }
        
        async function loadHistoryEvent() {
            const eventId = document.getElementById('history-select').value;
            if (!eventId) {
                document.getElementById('history-content').style.display = 'none';
                document.getElementById('history-tab-nav').classList.remove('visible');
                return;
            }
            
            if (eventId === 'family-favourites') {
                await displayFavouritesView();
                return;
            }
            
            try {
                const doc = await db.collection('shabbat-history').doc(eventId).get();
                if (doc.exists) {
                    const data = doc.data();
                    displayHistoryEvent(data);
                }
            } catch (error) {
                console.error('Failed to load event:', error);
            }
        }
        
        function displayHistoryEvent(data) {
            document.getElementById('history-content').style.display = 'block';
            document.getElementById('history-tab-nav').classList.add('visible');
            
            // Display guest summary
            document.getElementById('history-guest-summary').innerHTML = `
                <strong>${data.totalGuests || 0} guests total</strong>
                <span class="summary-details">Event hosted by ${data.host}</span>
            `;
            
            // Display RSVPs in grid format like main page
            const rsvpContainer = document.getElementById('history-rsvp-list');
            rsvpContainer.innerHTML = '';
            
            // Display family members who came. Iterate the archived snapshot's own
            // roster (not the live familyMembers list) so renaming a family later
            // doesn't hide it from past events.
            Object.keys(data.rsvpData || {}).forEach(member => {
                if (data.rsvpData[member] && data.rsvpData[member].status === 'coming') {
                    const rsvpRow = document.createElement('div');
                    rsvpRow.className = 'rsvp-grid';

                    rsvpRow.innerHTML = `
                        <div class="family-member">${member}</div>
                        <span></span>
                        <span class="guest-count-num">${data.rsvpData[member].guests}</span>
                        <div class="rsvp-status coming">Came</div>
                    `;
                    
                    rsvpContainer.appendChild(rsvpRow);
                }
            });
            
            // Display additional guests
            if (data.additionalGuests) {
                data.additionalGuests.forEach(guest => {
                    if (guest.status === 'coming') {
                        const rsvpRow = document.createElement('div');
                        rsvpRow.className = 'rsvp-grid';
                        
                        rsvpRow.innerHTML = `
                            <div class="family-member guest-row">
                                ${guest.name}
                                <span class="guest-label">(guest)</span>
                            </div>
                            <span></span>
                            <span class="guest-count-num">${guest.guests || 1}</span>
                            <div class="rsvp-status coming">Came</div>
                        `;
                        
                        rsvpContainer.appendChild(rsvpRow);
                    }
                });
            }
            
            // Display what was brought in grid format
            const menuContainer = document.getElementById('history-menu-list');
            menuContainer.innerHTML = '';
            
            // Add menu notes if they exist
            if (data.menuNotes && data.menuNotes.trim() !== '') {
                const notesDiv = document.createElement('div');
                notesDiv.className = 'menu-notes-section';
                const label = document.createElement('label');
                label.className = 'notes-label';
                label.textContent = 'Menu Notes:';
                const notesBody = document.createElement('div');
                notesBody.style.cssText = 'padding: 10px; background: var(--background-color); border-radius: 8px; white-space: pre-wrap;';
                notesBody.textContent = data.menuNotes;
                notesDiv.appendChild(label);
                notesDiv.appendChild(notesBody);
                menuContainer.appendChild(notesDiv);
            }
            
            if (data.bringItems && data.bringData) {
                data.bringItems.forEach(item => {
                    if (data.bringData[item] && data.bringData[item].assigned) {
                        const itemRow = document.createElement('div');
                        itemRow.className = 'bring-item';

                        const nameDiv = document.createElement('div');
                        nameDiv.className = 'item-name';
                        nameDiv.textContent = item;

                        const statusDiv = document.createElement('div');
                        statusDiv.className = 'item-status item-covered';
                        statusDiv.textContent = '✓ ' + data.bringData[item].person;

                        const favouriteCount = favouritesData[item] ? favouritesData[item].length : 0;
                        const favBtn = document.createElement('button');
                        favBtn.className = 'favourite-btn';
                        favBtn.textContent = favouriteCount > 0 ? ('Favourited (' + favouriteCount + ')') : 'Favourite';
                        favBtn.addEventListener('click', () => showNameInputModal(item, data.date));

                        itemRow.appendChild(nameDiv);
                        itemRow.appendChild(statusDiv);
                        itemRow.appendChild(favBtn);
                        menuContainer.appendChild(itemRow);
                    }
                });
            }
            
            if (menuContainer.children.length === 0) {
                menuContainer.innerHTML = `
                    <div class="empty-state">
                        <p>No menu items recorded for this event</p>
                    </div>
                `;
            }
        }
        
        
        // Check if we need to archive (runs on page load)
        async function checkAutoArchive() {
            console.log("🔍 Checking if auto-archive is needed...");
            
            // Check if there's meaningful data to archive
            const hasRSVPData = Object.values(rsvpData).some(r => r.status !== 'pending');
            const hasMenuData = bringItems.length > 0 || Object.values(bringData).some(d => d && d.assigned);
            const hasAdditionalGuests = additionalGuests.length > 0;
            
            if (!hasRSVPData && !hasMenuData && !hasAdditionalGuests) {
                console.log("❌ No meaningful data to archive, skipping");
                return;
            }
            
            // Get the event date - either manually set or calculated
            let eventDate;
            if (currentDate) {
                eventDate = new Date(currentDate);
            } else {
                // If no manual date set, assume it's for the last/current Friday
                const today = new Date();
                const dayOfWeek = today.getDay();
                const daysFromFriday = dayOfWeek === 0 ? 2 : (dayOfWeek === 6 ? 1 : (5 - dayOfWeek + 7) % 7);
                
                // If it's Sunday-Thursday, assume data is from last Friday
                // If it's Friday or Saturday, use current Friday
                if (dayOfWeek === 0 || (dayOfWeek >= 1 && dayOfWeek <= 4)) {
                    // Sunday through Thursday - use last Friday
                    eventDate = new Date(today);
                    eventDate.setDate(today.getDate() - ((dayOfWeek + 2) % 7));
                } else {
                    // Friday or Saturday - use current Friday
                    eventDate = new Date(today);
                    if (dayOfWeek === 6) {
                        eventDate.setDate(today.getDate() - 1);
                    }
                }
            }
            
            const now = new Date();
            
            // Archive if the event date is in the past and it's the morning after
            if (eventDate.getDay() === 5) { // Friday event
                const saturdayMorning = new Date(eventDate);
                saturdayMorning.setDate(eventDate.getDate() + 1);
                saturdayMorning.setHours(9, 0, 0, 0); // 9 AM Saturday morning
                
                if (now > saturdayMorning) {
                    console.log("📦 Auto-archiving Friday night event");
                    await archiveCurrentEvent();
                } else {
                    console.log("✅ Friday event is still current");
                }
            } else if (eventDate.getDay() === 6) { // Saturday lunch
                const sundayMorning = new Date(eventDate);
                sundayMorning.setDate(eventDate.getDate() + 1);
                sundayMorning.setHours(9, 0, 0, 0); // 9 AM Sunday morning
                
                if (now > sundayMorning) {
                    console.log("📦 Auto-archiving Saturday lunch event");
                    await archiveCurrentEvent();
                } else {
                    console.log("✅ Saturday event is still current");
                }
            }
        }

        // Tab switching functionality
        function switchTab(tabName) {
            // Remove active class from all tabs
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            
            // Add active class to selected tab
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }
        
        // Bottom navigation functionality
        function switchView(viewName) {
            // Remove active class from all nav buttons in both views
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            // Add active class to selected nav buttons in both views
            document.querySelectorAll(`[data-nav="${viewName}"]`).forEach(btn => btn.classList.add('active'));
            
            if (viewName === 'plan') {
                showMainView();
            } else if (viewName === 'history') {
                showHistory();
            } else if (viewName === 'share') {
                shareSummary();
            }
        }
        
        // History tab switching functionality
        function switchHistoryTab(tabName) {
            // Remove active class from all history tabs
            document.querySelectorAll('#history-tab-nav .tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('#history-content .tab-pane').forEach(pane => pane.classList.remove('active'));
            
            // Add active class to selected tab
            document.querySelector(`#history-tab-nav [data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }
        
        // Favourites functionality
        let currentFavouriteItem = '';
        let currentFavouriteDate = '';
        
        async function displayFavouritesView() {
            document.getElementById('history-content').style.display = 'block';
            document.getElementById('history-tab-nav').classList.remove('visible');
            
            // Hide all tabs and show favourites tab
            document.querySelectorAll('#history-content .tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById('favourites-tab').classList.add('active');
            
            await loadFavouritesFromFirebase();
            displayFavouritesList();
        }
        
        function displayFavouritesList() {
            const favouritesContainer = document.getElementById('favourites-list');
            favouritesContainer.innerHTML = '';
            
            // Sort items by popularity (most favourites first)
            const sortedItems = Object.entries(favouritesData)
                .sort(([,a], [,b]) => b.length - a.length);
            
            if (sortedItems.length === 0) {
                favouritesContainer.innerHTML = `
                    <div class="empty-state">
                        <p>No favourites yet! Add some by visiting past events and clicking the ⭐ Favourite button on menu items.</p>
                    </div>
                `;
                return;
            }
            
            sortedItems.forEach(([item, favourites]) => {
                const itemRow = document.createElement('div');
                itemRow.className = 'bring-item';

                const sourceEvent = favourites[favourites.length - 1].event;

                const nameDiv = document.createElement('div');
                nameDiv.className = 'item-name';
                nameDiv.textContent = item;

                const statusDiv = document.createElement('div');
                statusDiv.className = 'item-status item-covered';
                statusDiv.textContent = 'From: ' + sourceEvent;

                const countBtn = document.createElement('button');
                countBtn.className = 'favourite-count-btn';
                countBtn.textContent = favourites.length + (favourites.length === 1 ? ' favourite' : ' favourites');
                countBtn.addEventListener('click', () => showWhoFavouritedModal(item));

                const favBtn = document.createElement('button');
                favBtn.className = 'favourite-btn';
                favBtn.textContent = 'Favourite';
                favBtn.addEventListener('click', () => showNameInputModal(item, sourceEvent));

                itemRow.appendChild(nameDiv);
                itemRow.appendChild(statusDiv);
                itemRow.appendChild(countBtn);
                itemRow.appendChild(favBtn);
                favouritesContainer.appendChild(itemRow);
            });
        }
        
        function showNameInputModal(item, eventDate) {
            currentFavouriteItem = item;
            currentFavouriteDate = eventDate;
            document.getElementById('name-input').value = '';
            document.getElementById('name-input').focus();
            document.getElementById('name-input-modal').style.display = 'flex';
        }
        
        function closeNameInputModal() {
            document.getElementById('name-input-modal').style.display = 'none';
        }
        
        async function addFavourite() {
            const name = document.getElementById('name-input').value.trim();
            if (!name) return;
            
            if (!favouritesData[currentFavouriteItem]) {
                favouritesData[currentFavouriteItem] = [];
            }
            
            // Add the favourite
            favouritesData[currentFavouriteItem].push({
                name: name,
                event: currentFavouriteDate,
                date: new Date().toISOString().split('T')[0]
            });
            
            await saveFavouritesToFirebase();
            closeNameInputModal();
            
            // Refresh the current view
            const currentSelection = document.getElementById('history-select').value;
            if (currentSelection === 'family-favourites') {
                displayFavouritesList();
            } else {
                // Refresh the history event to update button text
                loadHistoryEvent();
            }
        }
        
        function showWhoFavouritedModal(item) {
            document.getElementById('who-favourited-title').textContent = `Who favourited "${item}"`;
            
            const listContainer = document.getElementById('who-favourited-list');
            listContainer.innerHTML = '';
            
            if (!favouritesData[item] || favouritesData[item].length === 0) {
                listContainer.innerHTML = '<p>No one has favourited this item yet.</p>';
            } else {
                favouritesData[item].forEach(favourite => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `<strong>${favourite.name}</strong> - ${favourite.date}`;
                    listContainer.appendChild(div);
                });
            }
            
            document.getElementById('who-favourited-modal').style.display = 'flex';
        }
        
        function closeWhoFavouritedModal() {
            document.getElementById('who-favourited-modal').style.display = 'none';
        }
    </script>
